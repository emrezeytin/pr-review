# Drop this file into any repo at .github/workflows/pr-review.yml
# Replace emrezeytin with your GitHub username or org.
name: PR Review

on:
  # Use pull_request_target so caller secrets are available for forked PRs.
  # This workflow must not check out or execute untrusted fork code.
  pull_request_target:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: >-
      github.event_name == 'pull_request_target' ||
      (github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/review'))
    uses: emrezeytin/pr-review/.github/workflows/pr-review.yml@master
    with:
      pr_url: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.html_url || format('https://github.com/{0}/pull/{1}', github.repository, github.event.issue.number) }}
    secrets:
      UPSTASH_BOX_API_KEY: ${{ secrets.UPSTASH_BOX_API_KEY }}
