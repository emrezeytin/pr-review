# Drop this file into any repo at .github/workflows/pr-review.yml
# Replace emrezeytin with your GitHub username or org.
name: PR Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/review'))
    uses: emrezeytin/pr-review/.github/workflows/pr-review.yml@master
    with:
      pr_url: ${{ github.event_name == 'pull_request' && github.event.pull_request.html_url || format('https://github.com/{0}/pull/{1}', github.repository, github.event.issue.number) }}
    secrets: inherit
